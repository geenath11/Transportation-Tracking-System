name: Smart Transport CI/CD

on:
  push:
    branches:
      - main
      - develop
    tags:
      - "v*"

  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ==================================================
  # 1. Check Admin Panel
  # ==================================================
  admin-check:
    name: Check Admin Panel
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/admin

    steps:
      # Download repository
      - name: 📥 Checkout Repository
        uses: actions/checkout@v5

      # Check whether admin folder exists
      - name: 📁 Check Admin Folder
        run: |
          if [ ! -d "." ]; then
            echo "Admin folder was not found"
            exit 1
          fi

          if [ ! -f "package.json" ]; then
            echo "package.json was not found inside apps/admin"
            exit 1
          fi

          echo "Admin project folder found successfully"

      # Install Node.js
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/admin/package-lock.json

      # Install packages
      - name: 📦 Install Admin Dependencies
        run: npm ci

      # Check code formatting
      - name: 📝 Check Code Formatting
        run: npm run format:check
        if: ${{ hashFiles('apps/admin/package.json') != '' }}

      # Check JavaScript/TypeScript errors
      - name: 🔍 Run ESLint
        run: npm run lint

      # Run admin tests
      - name: 🧪 Run Admin Tests
        run: npm test -- --run

      # Build admin project
      - name: 🏗️ Build Admin Panel
        run: npm run build

      # Check build folder
      - name: ✅ Verify Admin Build
        run: |
          if [ -d "dist" ]; then
            echo "Vite build folder found"
            ls -la dist
          elif [ -d "build" ]; then
            echo "React build folder found"
            ls -la build
          else
            echo "Admin build folder was not created"
            exit 1
          fi

      # Upload Vite build
      - name: 📤 Upload Vite Admin Build
        if: ${{ hashFiles('apps/admin/dist/**') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: admin-panel-vite-${{ github.sha }}
          path: apps/admin/dist/
          if-no-files-found: error
          retention-days: 14

      # Upload React build
      - name: 📤 Upload React Admin Build
        if: ${{ hashFiles('apps/admin/build/**') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: admin-panel-react-${{ github.sha }}
          path: apps/admin/build/
          if-no-files-found: error
          retention-days: 14


  # ==================================================
  # 2. Check and Build Flutter Mobile App
  # ==================================================
  mobile-check:
    name: Check Flutter Mobile App
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/mobile_app

    steps:
      # Download repository
      - name: 📥 Checkout Repository
        uses: actions/checkout@v5

      # Check Flutter folder
      - name: 📁 Check Flutter Project
        run: |
          if [ ! -f "pubspec.yaml" ]; then
            echo "pubspec.yaml was not found in apps/mobile_app"
            exit 1
          fi

          echo "Flutter project found successfully"

      # Install Java
      - name: ☕ Setup Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      # Install Flutter
      - name: 🦋 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.44.0"
          cache: true

      # Show Flutter information
      - name: 🔎 Flutter Doctor
        run: flutter doctor -v

      # Install Flutter packages
      - name: 📦 Install Flutter Dependencies
        run: flutter pub get

      # Check Dart formatting
      - name: 📝 Check Dart Formatting
        run: dart format --output=none --set-exit-if-changed lib test

      # Check Flutter errors
      - name: 🔍 Analyze Flutter Project
        run: flutter analyze

      # Run Flutter tests
      - name: 🧪 Run Flutter Tests
        run: flutter test

      # Build APK
      - name: 🏗️ Build Release APK
        run: flutter build apk --release --split-per-abi

      # Check APK files
      - name: ✅ Verify APK Output
        run: |
          ls -la build/app/outputs/flutter-apk

          test -f \
          build/app/outputs/flutter-apk/app-arm64-v8a-release.apk

      # Collect APK files
      - name: 📦 Collect APK Files
        run: |
          mkdir -p artifacts
          cp build/app/outputs/flutter-apk/*.apk artifacts/

      # Upload APK files
      - name: 📤 Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: smart-transport-mobile-app-${{ github.sha }}
          path: apps/mobile_app/artifacts/*.apk
          if-no-files-found: error
          retention-days: 14

      # Create release only when a tag is pushed
      - name: 🚀 Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: Smart Transport System ${{ github.ref_name }}
          artifacts: apps/mobile_app/artifacts/*.apk
          generateReleaseNotes: true
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}