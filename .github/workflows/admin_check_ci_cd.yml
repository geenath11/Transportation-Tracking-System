name: Smart Transport CI/CD

on:
  push:
    branches:
      - main
      - develop
    tags:
      - "v*"

  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ==================================================
  # Admin Panel Error Checking
  # ==================================================
  admin-check:
    name: Check Admin Panel
    runs-on: ubuntu-latest

  steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Check Admin Project Files
        run: |
          if [ ! -d "apps/admin" ]; then
            echo "ERROR: apps/admin folder was not found"
            exit 1
          fi

          if [ ! -f "apps/admin/package.json" ]; then
            echo "ERROR: apps/admin/package.json was not found"
            exit 1
          fi

          echo "Admin project found successfully"

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install Admin Dependencies
        working-directory: apps/admin
        run: |
          if [ -f "package-lock.json" ]; then
            npm ci
          else
            echo "package-lock.json not found. Using npm install."
            npm install
          fi

      - name: Run ESLint
        working-directory: apps/admin
        run: |
          if npm run | grep -q "lint"; then
            npm run lint
          else
            echo "Lint script not found. Skipping ESLint."
          fi

      - name: Check Code Formatting
        working-directory: apps/admin
        run: |
          if npm run | grep -q "format:check"; then
            npm run format:check
          else
            echo "format:check script not found. Skipping formatting check."
          fi

      - name: Run Admin Tests
        working-directory: apps/admin
        run: |
          if npm run | grep -q "test"; then
            npm test -- --runInBand
          else
            echo "Test script not found. Skipping tests."
          fi
        env:
          CI: true

      - name: Build Admin Panel
        working-directory: apps/admin
        run: |
          if npm run | grep -q "build"; then
            npm run build
          else
            echo "ERROR: build script was not found in package.json"
            exit 1
          fi

      - name: Verify Admin Build
        working-directory: apps/admin
        run: |
          if [ -d "dist" ]; then
            echo "Vite dist folder found"
            ls -la dist
          elif [ -d "build" ]; then
            echo "React build folder found"
            ls -la build
          else
            echo "ERROR: No dist or build folder was created"
            exit 1
          fi

      - name: Upload Vite Build
        if: ${{ hashFiles('apps/admin/dist/**') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: admin-vite-${{ github.sha }}
          path: apps/admin/dist/
          if-no-files-found: error
          retention-days: 14

      - name: Upload React Build
        if: ${{ hashFiles('apps/admin/build/**') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: admin-react-${{ github.sha }}
          path: apps/admin/build/
          if-no-files-found: error
          retention-days: 14

   # ==================================================
  # Flutter Mobile Application
  # ==================================================
  mobile-check:
    name: Check Flutter Mobile App
    runs-on: ubuntu-latest

  steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Check Flutter Project
        run: |
          if [ ! -f "apps/mobile_app/pubspec.yaml" ]; then
            echo "ERROR: apps/mobile_app/pubspec.yaml was not found"
            exit 1
          fi

          echo "Flutter project found successfully"

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.44.0"
          cache: true

      - name: Flutter Doctor
        run: flutter doctor -v

      - name: Install Flutter Dependencies
        working-directory: apps/mobile_app
        run: flutter pub get

      - name: Check Dart Formatting
        working-directory: apps/mobile_app
        run: dart format --output=none --set-exit-if-changed lib test

      - name: Analyze Flutter Project
        working-directory: apps/mobile_app
        run: flutter analyze

      - name: Run Flutter Tests
        working-directory: apps/mobile_app
        run: |
          if [ -d "test" ]; then
            flutter test
          else
            echo "Test folder not found. Skipping Flutter tests."
          fi

      - name: Build Release APK
        working-directory: apps/mobile_app
        run: flutter build apk --release --split-per-abi

      - name: Verify APK Output
        working-directory: apps/mobile_app
        run: |
          ls -la build/app/outputs/flutter-apk
          test -f build/app/outputs/flutter-apk/app-arm64-v8a-release.apk

      - name: Collect APK Files
        working-directory: apps/mobile_app
        run: |
          mkdir -p artifacts
          cp build/app/outputs/flutter-apk/*.apk artifacts/

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: smart-transport-mobile-${{ github.sha }}
          path: apps/mobile_app/artifacts/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: Smart Transport System ${{ github.ref_name }}
          artifacts: apps/mobile_app/artifacts/*.apk
          generateReleaseNotes: true
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}