name: Flutter CI/CD

on:
  push:
    branches:
      - main
      - develop
    tags:
      - "v*"

  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and Test Flutter App
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/mobile_app

    steps:
      # 1. Checkout repository
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup Java 21
      - name: ☕ Setup Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      # 3. Setup Flutter
      - name: 🦋 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.44.0"
          cache: true

      # 4. Cache Gradle
      - name: ⚡ Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('apps/mobile_app/android/**/*.gradle*', 'apps/mobile_app/android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 5. Show Flutter information
      - name: 🔎 Flutter Doctor
        run: flutter doctor -v

      # 6. Install dependencies
      - name: 📥 Install Dependencies
        run: flutter pub get

      # 7. Check formatting
      - name: 📝 Check Code Formatting
        run: dart format --output=none --set-exit-if-changed .

      # 8. Analyze project
      - name: 🔍 Analyze Flutter Project
        run: flutter analyze

      # 9. Run tests
      - name: 🧪 Run Unit Tests
        run: flutter test

      # 10. Build release APK files
      - name: 🏗️ Build Release APK
        run: flutter build apk --release --split-per-abi

      # 11. Verify APK output
      - name: ✅ Verify APK Output
        run: |
          ls -la build/app/outputs/flutter-apk
          test -f build/app/outputs/flutter-apk/app-arm64-v8a-release.apk

      # 12. Collect APK files
      - name: 📦 Collect APK Files
        run: |
          mkdir -p artifacts
          cp build/app/outputs/flutter-apk/*.apk artifacts/

      # 13. Upload APK files to workflow artifacts
      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: smart-transport-mobile-app-${{ github.sha }}
          path: apps/mobile_app/artifacts/*.apk
          if-no-files-found: error
          retention-days: 14

      # 14. Create GitHub Release for version tags
      - name: 🚀 Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: Smart Transport Mobile App ${{ github.ref_name }}
          artifacts: apps/mobile_app/artifacts/*.apk
          generateReleaseNotes: true
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}